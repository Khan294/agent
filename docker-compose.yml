services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_demo
    ports:
      - "5433:5432"
    volumes:
      - agent_demo_postgres:/var/lib/postgresql/data

volumes:
  agent_demo_postgres:
